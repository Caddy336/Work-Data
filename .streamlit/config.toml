# Streamlit 配置文件

[theme]
primaryColor = "#6F4E37"  # 咖啡色
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]

# 启用文件监视（开发模式）
fileWatcherType = "auto"
# 启用 CORS
enableCORS = false
enableXsrfProtection = true

[browser]
# 自动打开浏览器
gatherUsageStats = false

[runner]
# 快速重新运行
fastReruns = true
